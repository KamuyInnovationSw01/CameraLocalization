# カメラキャリブレーション設定
calibration:
  # キャリブレーションパラメータファイルのパス（相対パス）
  parameters_file: "eMeetNova.json"

# 使用するローカライゼーション方式: marker または markerless
localization:
  mode: "markerless"

# ARマーカー設定
marker:
  # マーカーサイズ（メートル単位）
  size_m: 0.1  # 10cm × 10cm
  # ArUco辞書タイプ
  dictionary: "DICT_4X4_50"
  # マーカーの期待ID（自動検出する場合はnull）
  expected_id: 1

# マーカーレス方式の簡易3Dマップ設定
markerless:
  map_file: "markerless_map.npz"
  device: "auto"  # auto, cuda, cpu
  max_keypoints: 2048
  min_matches: 30
  min_inliers: 15

# UI ウィンドウ設定
ui:
  # カメラ映像ウィンドウ
  camera_window:
    name: "Camera Feed"
    width: 960
    height: 720
    x_pos: 0
    y_pos: 0
  
  # 3D ワイヤフレーム表示ウィンドウ
  wireframe_window:
    name: "3D Wireframe - Camera Pose"
    width: 960
    height: 720
    x_pos: 960
    y_pos: 0

# 処理設定
processing:
  # 3D 描画パラメータ
  wireframe_scale: 0.15  # 相対的なスケール

# デバッグ設定
debug:
  # 検出されたマーカーの情報を表示
  show_marker_info: true
  # ポーズ推定情報を表示
  show_pose_info: true
  # 3D ビュー描画を有効化（無効にするとパフォーマンス向上、画面は暗いグレーになります）
  enable_3d_render: true
